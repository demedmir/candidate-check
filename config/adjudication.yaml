# Adjudication rule-pack.
#
# ПРАВИЛО: штрафуем ТОЛЬКО за реальный негатив (`fail` — кандидат реально найден
# в чёрном реестре). Технические warning'и/error'ы (WAF блокирует, нет API-ключа,
# кэш не загружен) НЕ начисляются — это наша проблема, не кандидата.
#
# Светофор по итоговому скору:
#   green  : 0
#   yellow : 1..69
#   red    : >=70

segments:
  default:
    thresholds:
      green_max: 0       # ровно 0 → green (никаких негативов)
      yellow_max: 69     # 1..69 → yellow
      # 70+ → red
    weights:
      inn_checksum:     {fail: 0,   warning: 0,   error: 0}
      fns_npd:          {fail: 0,   warning: 0,   error: 0}
      fns_rdl:          {fail: 100, warning: 0,   error: 0}
      efrsb_persons:    {fail: 80,  warning: 0,   error: 0}
      rosfinmon:        {fail: 100, warning: 0,   error: 0}
      opensanctions:    {fail: 100, warning: 0,   error: 0}
      passport_mvd:     {fail: 70,  warning: 0,   error: 0}
      fssp:             {fail: 50,  warning: 0,   error: 0}

  driver:
    thresholds:
      green_max: 0
      yellow_max: 49
    weights:
      inn_checksum:     {fail: 0,   warning: 0,   error: 0}
      fns_npd:          {fail: 0,   warning: 0,   error: 0}
      fns_rdl:          {fail: 100, warning: 0,   error: 0}
      efrsb_persons:    {fail: 50,  warning: 0,   error: 0}
      rosfinmon:        {fail: 100, warning: 0,   error: 0}
      opensanctions:    {fail: 100, warning: 0,   error: 0}
      passport_mvd:     {fail: 100, warning: 0,   error: 0}
      fssp:             {fail: 70,  warning: 0,   error: 0}

  financial:
    thresholds:
      green_max: 0
      yellow_max: 39
    weights:
      inn_checksum:     {fail: 0,   warning: 0,   error: 0}
      fns_npd:          {fail: 0,   warning: 0,   error: 0}
      fns_rdl:          {fail: 100, warning: 0,   error: 0}
      efrsb_persons:    {fail: 100, warning: 0,   error: 0}
      rosfinmon:        {fail: 100, warning: 0,   error: 0}
      opensanctions:    {fail: 100, warning: 0,   error: 0}
      passport_mvd:     {fail: 100, warning: 0,   error: 0}
      fssp:             {fail: 100, warning: 0,   error: 0}
