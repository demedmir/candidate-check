<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}candidate-check{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.2"></script>
</head>
<body>
<header class="topbar">
    <a href="/hr/candidates" class="brand">candidate-check</a>
    {% if user %}
    <span class="user">{{ user.email }}</span>
    <form action="/hr/logout" method="post" class="inline">
        <button type="submit" class="link">Выйти</button>
    </form>
    {% endif %}
</header>
<main class="container">
    {% block content %}{% endblock %}
</main>
</body>
</html>
