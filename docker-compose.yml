x-dns: &default-dns
  dns:
    - 1.1.1.1
    - 8.8.8.8

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    <<: *default-dns
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    <<: *default-dns
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    <<: *default-dns
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${APP_PORT:-8000}:8000"
    volumes:
      - uploads:/data/uploads
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./config:/app/config
      - ./tests:/app/tests
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 ${APP_RELOAD:-}

  worker:
    build: .
    restart: unless-stopped
    <<: *default-dns
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - uploads:/data/uploads
      - ./app:/app/app
      - ./config:/app/config
    command: arq app.worker.WorkerSettings

volumes:
  pgdata:
  uploads:
